<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account | StuNest</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="assets/css/base.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 antialiased min-h-screen">

    <header class="border-b border-gray-100 bg-white">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-xl leading-none tracking-tighter">S</span>
                </div>
                <span class="text-xl font-bold tracking-tight">StuNest.</span>
            </a>
            <a href="login.html" class="text-sm font-medium text-gray-600 hover:text-gray-900">Log in</a>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-12 pb-24">
        <h1 class="text-3xl font-semibold tracking-tight text-center mb-2">Create your account</h1>
        <p class="text-gray-500 text-center text-sm mb-10">Choose how you will use StuNest — you can only pick one account type.</p>

        <!-- Step 1: account type -->
        <div id="step-role" class="space-y-6">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider text-center">Step 1 — Account type</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button type="button" class="role-card text-left rounded-2xl border-2 border-gray-200 bg-white p-6 hover:border-gray-900 transition-colors" data-role="student">
                    <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center mb-4">
                        <i data-lucide="graduation-cap" class="w-5 h-5"></i>
                    </div>
                    <h2 class="font-semibold text-lg">Student</h2>
                    <p class="text-sm text-gray-500 mt-1">Search, save, and apply for verified student housing.</p>
                </button>
                <button type="button" class="role-card text-left rounded-2xl border-2 border-gray-200 bg-white p-6 hover:border-gray-900 transition-colors" data-role="institution">
                    <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center mb-4">
                        <i data-lucide="landmark" class="w-5 h-5"></i>
                    </div>
                    <h2 class="font-semibold text-lg">Institution</h2>
                    <p class="text-sm text-gray-500 mt-1">Partner tools for universities and accommodation teams.</p>
                </button>
                <button type="button" class="role-card text-left rounded-2xl border-2 border-gray-200 bg-white p-6 hover:border-gray-900 transition-colors" data-role="landlord">
                    <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center mb-4">
                        <i data-lucide="building-2" class="w-5 h-5"></i>
                    </div>
                    <h2 class="font-semibold text-lg">Landlord</h2>
                    <p class="text-sm text-gray-500 mt-1">List rooms, manage bookings, and message applicants.</p>
                </button>
                <button type="button" class="role-card text-left rounded-2xl border-2 border-gray-200 bg-white p-6 hover:border-gray-900 transition-colors" data-role="agent">
                    <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center mb-4">
                        <i data-lucide="briefcase" class="w-5 h-5"></i>
                    </div>
                    <h2 class="font-semibold text-lg">Agent</h2>
                    <p class="text-sm text-gray-500 mt-1">Manage portfolios, viewings, and leads for multiple landlords.</p>
                </button>
            </div>
        </div>

        <!-- Step 2: details -->
        <div id="step-form" class="hidden mt-4">
            <div class="flex items-center justify-between mb-6">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Step 2 — Your details</p>
                <button type="button" id="btn-back" class="text-sm font-medium text-gray-600 hover:text-gray-900 flex items-center gap-1">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Change type
                </button>
            </div>

            <form id="register-form" class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm space-y-5" action="#" method="post">
                <input type="hidden" name="role" id="field-role" value="">

                <div id="fields-student" class="role-fields hidden space-y-5">
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Full name</span>
                        <input name="full_name" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="Alex Johnson">
                    </label>
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">University email</span>
                        <input type="email" name="email" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="you@university.ac.uk">
                    </label>
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Course start year</span>
                        <input name="start_year" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="2026">
                    </label>
                </div>

                <div id="fields-institution" class="role-fields hidden space-y-5">
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Institution name</span>
                        <input name="org_name" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="University of …">
                    </label>
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Work email</span>
                        <input type="email" name="email" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="housing@university.ac.uk">
                    </label>
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Department / role</span>
                        <input name="department" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="Accommodation office">
                    </label>
                </div>

                <div id="fields-landlord" class="role-fields hidden space-y-5">
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Your name</span>
                        <input name="full_name" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="Jamie Smith">
                    </label>
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Email</span>
                        <input type="email" name="email" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="hello@example.com">
                    </label>
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Phone</span>
                        <input type="tel" name="phone" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="+44 …">
                    </label>
                </div>

                <div id="fields-agent" class="role-fields hidden space-y-5">
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Agency name</span>
                        <input name="agency_name" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="Elite Lettings">
                    </label>
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Professional email</span>
                        <input type="email" name="email" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="team@agency.com">
                    </label>
                    <label class="block">
                        <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">PRS / license ref (optional)</span>
                        <input name="license_ref" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="Reference number">
                    </label>
                </div>

                <label class="block">
                    <span class="text-xs font-semibold text-gray-900 uppercase tracking-wide">Password</span>
                    <input type="password" name="password" required minlength="8" class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-gray-400" placeholder="At least 8 characters">
                </label>

                <label class="flex items-start gap-3 text-sm text-gray-600">
                    <input type="checkbox" name="terms" required class="mt-1 rounded border-gray-300 text-black focus:ring-black">
                    <span>I agree to the <a href="#" class="font-medium text-gray-900 underline">Terms</a> and <a href="#" class="font-medium text-gray-900 underline">Privacy Policy</a>.</span>
                </label>

                <button type="submit" class="w-full bg-black text-white text-sm font-semibold py-3.5 rounded-xl hover:bg-gray-800 transition-colors">
                    Create account
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-10">
            Already have an account?
            <a href="login.html" class="font-semibold text-gray-900 hover:underline">Log in</a>
        </p>
    </main>

    <script>
        lucide.createIcons();

        var stepRole = document.getElementById('step-role');
        var stepForm = document.getElementById('step-form');
        var fieldRole = document.getElementById('field-role');
        var btnBack = document.getElementById('btn-back');
        var roleCards = document.querySelectorAll('.role-card');
        var roleFieldSets = document.querySelectorAll('.role-fields');

        function showFields(role) {
            roleFieldSets.forEach(function (el) {
                el.classList.add('hidden');
            });
            var target = document.getElementById('fields-' + role);
            if (target) target.classList.remove('hidden');
            fieldRole.value = role;
        }

        function selectRole(role) {
            stepRole.classList.add('hidden');
            stepForm.classList.remove('hidden');
            showFields(role);
            lucide.createIcons();
        }

        roleCards.forEach(function (card) {
            card.addEventListener('click', function () {
                selectRole(card.getAttribute('data-role'));
            });
        });

        btnBack.addEventListener('click', function () {
            stepForm.classList.add('hidden');
            stepRole.classList.remove('hidden');
        });

        var params = new URLSearchParams(window.location.search);
        var preset = params.get('role');
        if (preset && ['student', 'institution', 'landlord', 'agent'].indexOf(preset) !== -1) {
            selectRole(preset);
        }

        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
